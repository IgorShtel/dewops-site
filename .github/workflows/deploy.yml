name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Copy website
        run: |
          scp -i key.pem -o StrictHostKeyChecking=no index.html \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/index.html

      - name: Install website
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo cp /tmp/index.html /var/www/html/index.html && sudo systemctl reload nginx"
